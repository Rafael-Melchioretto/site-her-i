<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow p-4" style="width: 100%; max-width: 400px;">

 
    <h4 class="card-title text-center mb-4">Bem-vindo</h4>


    <ul class="nav nav-tabs mb-3" id="abas">
      <li class="nav-item">
        <button class="nav-link active" onclick="trocarAba('login')">Login</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" onclick="trocarAba('cadastro')">Cadastre-se</button>
      </li>
    </ul>

 
    <div id="alerta" class="alert d-none"></div>

    
    <div id="form-login">
      <div class="mb-3">
        <label class="form-label">E-mail</label>
        <input type="email" id="login-email" class="form-control" placeholder="seu@email.com" />
      </div>
      <div class="mb-3">
        <label class="form-label">Senha</label>
        <input type="password" id="login-senha" class="form-control" placeholder="Sua senha" />
      </div>
      <button class="btn btn-primary w-100" onclick="fazerLogin()">Entrar</button>
    </div>

    
    <div id="form-cadastro" class="d-none">
      <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" id="cad-nome" class="form-control" placeholder="Seu nome" />
      </div>
      <div class="mb-3">
        <label class="form-label">E-mail</label>
        <input type="email" id="cad-email" class="form-control" placeholder="seu@email.com" />
      </div>
      <div class="mb-3">
        <label class="form-label">Senha</label>
        <input type="password" id="cad-senha" class="form-control" placeholder="Mínimo 6 caracteres" />
      </div>
      <button class="btn btn-success w-100" onclick="fazerCadastro()">Criar conta</button>
    </div>

  </div>

  <script>
   
    const usuarios = [];

    function trocarAba(aba) {
      const isLogin = aba === 'login';

      document.getElementById('form-login').classList.toggle('d-none', !isLogin);
      document.getElementById('form-cadastro').classList.toggle('d-none', isLogin);

      
      const botoes = document.querySelectorAll('#abas .nav-link');
      botoes[0].classList.toggle('active', isLogin);
      botoes[1].classList.toggle('active', !isLogin);

      esconderAlerta();
    }


    function mostrarAlerta(mensagem, tipo) {
      const alerta = document.getElementById('alerta');
      alerta.textContent = mensagem;
      alerta.className = `alert alert-${tipo}`;
    }

    function esconderAlerta() {
      document.getElementById('alerta').className = 'alert d-none';
    }

  
    function fazerLogin() {
      const email = document.getElementById('login-email').value.trim();
      const senha = document.getElementById('login-senha').value;

      if (!email || !senha) {
        mostrarAlerta('Preencha todos os campos.', 'warning');
        return;
      }

      const usuario = usuarios.find(u => u.email === email && u.senha === senha);

      if (usuario) {
        mostrarAlerta('Login realizado com sucesso! Redirecionando…', 'success');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      } else {
        mostrarAlerta('E-mail ou senha incorretos.', 'danger');
      }
    }

   
    function fazerCadastro() {
      const nome  = document.getElementById('cad-nome').value.trim();
      const email = document.getElementById('cad-email').value.trim();
      const senha = document.getElementById('cad-senha').value;

      if (!nome || !email || !senha) {
        mostrarAlerta('Preencha todos os campos.', 'warning');
        return;
      }

      if (senha.length < 6) {
        mostrarAlerta('A senha precisa ter pelo menos 6 caracteres.', 'warning');
        return;
      }

      if (usuarios.find(u => u.email === email)) {
        mostrarAlerta('Este e-mail já está cadastrado.', 'danger');
        return;
      }

      usuarios.push({ nome, email, senha });
      mostrarAlerta('Conta criada! Faça login agora.', 'success');
      trocarAba('login');
    }
  </script>

</body>
</html>
