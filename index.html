
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow p-4" style="width: 100%; max-width: 400px;">

    <h4 class="text-center mb-4">Login</h4>

    <div id="alerta" class="alert d-none"></div>

    <div class="mb-3">
      <label>Usuário</label>
      <input type="text" id="login-user" class="form-control" placeholder="Admin">
    </div>

    <div class="mb-3">
      <label>Senha</label>
      <input type="password" id="login-senha" class="form-control" placeholder="123456">
    </div>

    <button onclick="window.location.href='home.html'">Entrar</button>
  
  </div>

  <script src="script.js"></script>

</body>
</html>
